<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        padding: 30px;
        background-color: #e6e7ee;
        width: 100vw;
        height: 100vh;
        /* background: linear-gradient(
          45deg,
          rgb(133, 255, 189) 0%,
          rgb(255, 251, 125) 100%
        ); */
        /* background-image: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); */
        /* background-image: linear-gradient(
          to top,
          #dad4ec 0%,
          #dad4ec 1%,
          #f3e7e9 100%
        ); */
        /* background-image: linear-gradient(to top, #209cff 0%, #68e0cf 100%); */
        /* background-image: linear-gradient(
          -225deg,
          #7085b6 0%,
          #87a7d9 50%,
          #def3f8 100%
        ); */
        /* background-image: linear-gradient(45deg, #93a5cf 0%, #e4efe9 100%); */
        background-image: linear-gradient(-20deg, #b721ff 0%, #21d4fd 100%);
        .img-wrap {
          position: absolute;
          top: 20px;
          left: 20px;
          &.normal {
            transform: perspective(280px) rotate3d(1, 1, -2, 15deg)
              translate3d(30px, 20px, 0) scale(1);
            /* transform-origin: 50% 50%; */
          }
          &.dark {
            top: 100px;
            transform: perspective(280px) rotate3d(1, 1, -2, 15deg)
              translate3d(390px, 230px, 0) scale(0.95);
            /* transform-origin: 50% 50%; */
            /* box-shadow: inset 2px 2px 4px #b3b3b3, inset -2px -2px 4px #fff; */
            box-shadow: none;
          }
          .img-radius {
            width: 100%;
            height: 473px;
            border-radius: 8px;
            overflow: hidden;
          }
          width: 800px;
          box-shadow: none;
          /* box-shadow: inset 5px 5px 10px #b3b3b3, inset -5px -5px 10px #fff; */
          border-radius: 8px;
          box-sizing: border-box;
          padding: 20px;

          img {
            width: 100%;
            height: 100%;
          }
        }
      }
    </style>
  </head>
  <body>
    <div class="img-wrap normal">
      <div class="img-radius">
        <img src="./0.jpg" alt="" />
      </div>
    </div>
    <div class="img-wrap dark">
      <div class="img-radius">
        <img src="./1.jpg" alt="" />
      </div>
    </div>
  </body>
</html>
